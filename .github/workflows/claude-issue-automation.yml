name: Claude Issue Automation

on:
  issues:
    types: [opened, labeled]

jobs:
  claude:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine skill file
        id: skill
        run: |
          LABELS="${{ join(github.event.issue.labels.*.name, ',') }}"
          echo "Labels: $LABELS"
          
          if echo "$LABELS" | grep -q "greenfield"; then
            echo "skill_file=.ai/skills/greenfield/skill.md" >> $GITHUB_OUTPUT
          elif echo "$LABELS" | grep -q "feature"; then
            echo "skill_file=.ai/skills/feature/skill.md" >> $GITHUB_OUTPUT
          elif echo "$LABELS" | grep -q "upgrade"; then
            echo "skill_file=.ai/skills/upgrade/skill.md" >> $GITHUB_OUTPUT
          else
            echo "No matching label found"
            echo "skill_file=" >> $GITHUB_OUTPUT
          fi

      - name: Run Claude Issue Automation
        if: steps.skill.outputs.skill_file != ''
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Process GitHub issue #${{ github.event.issue.number }}
            
            Title: ${{ github.event.issue.title }}
            Body: ${{ github.event.issue.body }}
            Labels: ${{ join(github.event.issue.labels.*.name, ', ') }}
            
            Follow instructions in ${{ steps.skill.outputs.skill_file }}
            Apply governance rules from .ai/governance/ and .ai/policies/
            Create a branch, implement changes, and open a PR with risk classification